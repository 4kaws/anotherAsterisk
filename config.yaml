agent:
  max_steps: 50
  token_budget: 100000          # hard stop if cumulative tokens exceed this
  screenshot_on_each_step: true
  headless: true                # set false for debugging

llm:
  anthropic:
    model: claude-sonnet-4-6
    max_tokens: 4096
  openai:
    model: gpt-4o
    max_tokens: 4096
  gemini:
    model: gemini-1.5-pro
    max_tokens: 4096

wiki:
  vault_path: ./wiki
  always_load:
    - index.md
    - status.md

browser:
  viewport_width: 1280
  viewport_height: 800
  slow_mo: 0                    # ms delay between actions, useful for debugging
